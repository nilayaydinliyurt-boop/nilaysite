<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilay Aydınlıyurt | Resmi Web Sitesi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: #fff; margin: 0; text-align: center; }
        header { padding: 50px 20px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border-bottom: 2px solid #d4af37; }
        .mesam-tag { background-color: #d4af37; color: #000; padding: 5px 15px; font-weight: bold; border-radius: 20px; font-size: 14px; text-transform: uppercase; }
        h1 { font-size: 3rem; margin: 10px 0; letter-spacing: 2px; }
        .subtitle { font-size: 1.2rem; color: #aaa; margin-bottom: 30px; }
        .profile-img { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #d4af37; object-fit: cover; margin-bottom: 20px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .song-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .song-card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .song-card:hover { border-color: #d4af37; transform: translateY(-5px); }
        .btn { display: inline-block; padding: 10px 20px; background-color: #d4af37; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        footer { padding: 40px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <span class="mesam-tag">MESAM Üyesi Sanatçı</span>
        <br><br>
        <img src="profil.jpg" alt="Nilay Aydınlıyurt" class="profile-img">
        <h1>NİLAY AYDINLIYURT</h1>
        <p class="subtitle">Söz Yazarı | Besteci | Sanatçı</p>
    </header>

    <div class="container">
        <h2>Şarkılarım</h2>
        <div class="song-list">
            <div class="song-card">
                <h3>Deli Deli</h3>
                <p>Söz & Müzik: Nilay Aydınlıyurt</p>
                <a href="#" target="_blank" class="btn">Dinle</a>
            </div>
            <div class="song-card">
                <h3>Adaçayı</h3>
                <p>Söz & Müzik: Nilay Aydınlıyurt</p>
                <a href="#" target="_blank" class="btn">Dinle</a>
            </div>
            <div class="song-card">
                <h3>Gelmiyorsun</h3>
                <p>Söz & Müzik: Nilay Aydınlıyurt</p>
                <a href="#" target="_blank" class="btn">Dinle</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Nilay Aydınlıyurt. Tüm Hakları Saklıdır.
    </footer>

</body>
</html>
